name: Deploy to GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate source Markdown
        run: |
          if [ -f scripts/validate.py ]; then
            python3 scripts/validate.py
          else
            echo "scripts/validate.py not found; skipping source Markdown validation."
          fi

      - name: Generate Starlight content
        run: |
          if [ -f scripts/sync_starlight_content.py ]; then
            python3 scripts/sync_starlight_content.py
          else
            echo "scripts/sync_starlight_content.py not found; skipping generated content check."
          fi

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          path: ${{ hashFiles('site/package.json') != '' && 'site' || '.' }}
          node-version: 24
          package-manager: npm@latest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
