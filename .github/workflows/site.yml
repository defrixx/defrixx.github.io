name: Deploy to GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate source Markdown
        run: python3 validate.py

      - name: Verify generated Starlight content
        run: python3 scripts/sync_starlight_content.py --check

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          path: site
          node-version: 24
          package-manager: npm@latest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
